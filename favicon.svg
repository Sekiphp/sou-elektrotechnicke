<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Left contact stub -->
  <line x1="2" y1="22" x2="12" y2="22" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <!-- Right contact stub -->
  <line x1="20" y1="22" x2="30" y2="22" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <!-- Diagonal moving contact (ends with gap before verticals) -->
  <line x1="12" y1="22" x2="21" y2="16" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <!-- Actuator: left vertical line -->
  <line x1="14" y1="20" x2="14" y2="6" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <!-- Actuator: right vertical line -->
  <line x1="19" y1="16" x2="19" y2="6" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <!-- Actuator horizontal bar (button) -->
  <line x1="9" y1="6" x2="24" y2="6" stroke="#222" stroke-width="2.5" stroke-linecap="round"/>
  <!-- End ticks -->
  <line x1="9" y1="6" x2="9" y2="9" stroke="#222" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="6" x2="24" y2="9" stroke="#222" stroke-width="2.5" stroke-linecap="round"/>
</svg>
